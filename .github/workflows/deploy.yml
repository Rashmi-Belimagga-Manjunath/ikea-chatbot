name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API key
        env:
          IKEA_KEY: ${{ secrets.IKEA_OPENAI_KEY }}
        run: |
          python3 -c "import os,pathlib;k=os.environ['IKEA_KEY'];c=pathlib.Path('index.html').read_text();c=c.replace('HARD_KEY_PLACEHOLDER',k);pathlib.Path('index.html').write_text(c);print('Injected. Verifying...');assert k in pathlib.Path('index.html').read_text();print('OK')"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
