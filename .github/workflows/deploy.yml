name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API key
        env:
          IKEA_KEY: ${{ secrets.IKEA_OPENAI_KEY }}
        run: |
          python3 -c "
import os, pathlib
key = os.environ['IKEA_KEY']
content = pathlib.Path('index.html').read_text()
assert 'HARD_KEY_PLACEHOLDER' in content, 'Placeholder not found!'
content = content.replace('HARD_KEY_PLACEHOLDER', key)
pathlib.Path('index.html').write_text(content)
print('Injection complete. Verifying...')
assert key in pathlib.Path('index.html').read_text(), 'Injection verification failed!'
print('Verified: API key successfully injected.')
"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
